<div class="flashcard-wrapper code-wrapper back-side">
  <!-- Anki Deck Data (Hidden) -->
  <div id="raw-deck-name-back" style="display:none;">{{Deck}}</div>

  <!-- Header (Metadata & Tags) -->
  <div class="metadata-row">
    <div class="badge badge-blue">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      <span class="parent-deck-text">PARENT DECK</span>
    </div>
    <div class="badge badge-purple">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path></svg>
      <span class="sub-deck-text">SUB DECK</span>
    </div>
    
    <!-- Tags Section -->
    {{#Tags}}
    <div class="badge badge-gray push-right">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
      <span>{{Tags}}</span>
    </div>
    {{/Tags}}
  </div>

  <!-- Comparison Layout (5/5 Ratio) -->
  <div class="code-split-back mt-4">
    
    <!-- Left: User Input and Errors (5 Units) -->
    <div class="ide-card">
      <div class="ide-header" style="border-bottom: 1px solid rgba(239, 68, 68, 0.3);">
        <div class="ide-dots">
          <span class="dot red"></span>
        </div>
        <div class="ide-title" style="color: #fca5a5;">YOUR INPUT & DIFF</div>
      </div>
      <div class="ide-content type-result-dark text-left">
        {{type:Back}}
      </div>
    </div>

    <!-- Right: Correct Code (5 Units) -->
    <div class="ide-card">
      <div class="ide-header" style="border-bottom: 1px solid rgba(16, 185, 129, 0.3);">
        <div class="ide-dots">
          <span class="dot green"></span>
        </div>
        <div class="ide-title" style="color: #6ee7b7;">CORRECT CODE</div>
      </div>
      <div class="ide-content code-block-wrapper-inner text-left">
        <pre class="code-block"><code>{{Back}}</code></pre>
      </div>
    </div>

  </div>

  <!-- Question Summary (Optional Reminder) -->
  <div class="question-summary text-left mt-4" style="background: #ffffff; padding: 16px; border-radius: 16px; border: 1px dashed #cbd5e1;">
    <div class="input-label mb-2">QUESTION RECAP</div>
    {{Front}}
  </div>

  <!-- Context Paneli -->
  {{#Context}}
  <details class="context-panel mt-4">
    <summary class="context-summary">
      <div class="context-title-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m3 15 2 2 4-4"/></svg>
        Remember Context
      </div>
      <svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </summary>
    <div class="context-content">
      {{Context}}
    </div>
  </details>
  {{/Context}}

  <!-- Image Panel -->
  {{#Image}}
  <details class="context-panel image-panel mt-4">
    <summary class="context-summary">
      <div class="context-title-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Remember Image
      </div>
      <svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </summary>
    <div class="context-content image-content">
      <div class="image-wrapper" onclick="openModal(this.innerHTML)">
         {{Image}}
      </div>
      <div class="zoom-hint-static">Click image to expand</div>
    </div>
  </details>
  {{/Image}}

</div>

<script>
  (function() {
    var deckElement = document.getElementById("raw-deck-name-back");
    if (deckElement && deckElement.textContent.indexOf("{{") === -1) {
      var fullDeck = deckElement.textContent.trim();
      var deckParts = fullDeck.split("::");
      var subDeck = deckParts.pop();
      var parentDecks = deckParts.length > 0 ? deckParts.join(" • ") : "MAIN DECK";

      var parentEls = document.querySelectorAll(".parent-deck-text");
      var subEls = document.querySelectorAll(".sub-deck-text");

      parentEls.forEach(function(el) { el.textContent = parentDecks.toUpperCase(); });
      subEls.forEach(function(el) { el.textContent = subDeck.toUpperCase(); });
    }
  })();

  function openModal(imgHtml) {
    var overlay = document.createElement('div');
    overlay.className = 'anki-modal-overlay';
    overlay.onclick = function() { document.body.removeChild(overlay); };

    var content = document.createElement('div');
    content.className = 'anki-modal-content';
    content.innerHTML = imgHtml;

    var closeBtn = document.createElement('div');
    closeBtn.className = 'anki-modal-close';
    closeBtn.innerHTML = '×';

    overlay.appendChild(content);
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);
  }
</script>
